

services:

  app:
    build: .
    container_name: fastify-app
    restart: always
    env_file: .env
    environment:
      - NODE_OPTIONS=--dns-result-order=ipv4first
    expose:
      - "3000"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    networks:
      - appnet

  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - appnet

networks:
  appnet: